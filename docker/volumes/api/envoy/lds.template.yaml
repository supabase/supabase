resources:
  - '@type': type.googleapis.com/envoy.config.listener.v3.Listener
    name: supabase
    
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8000
        
    filter_chains:
      - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              '@type': >-
                type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              upgrade_configs:
                - upgrade_type: websocket
              access_log:
                - name: envoy.access_loggers.stdout
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                    log_format:
                      text_format_source:
                        inline_string: "%DOWNSTREAM_REMOTE_ADDRESS_WITHOUT_PORT% - - [%START_TIME(%d/%b/%Y:%H:%M:%S %z)%] \"%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%\" %RESPONSE_CODE% %BYTES_SENT% \"%REQ(REFERER)%\" \"%REQ(USER-AGENT)%\"\n"
                
              route_config:
                name: supabase_route
                virtual_hosts:
                  - name: supabase_host
                    domains:
                      - '*'
                    routes:
                      - match:
                          prefix: /auth/v1/verify
                        route:
                          cluster: auth
                          prefix_rewrite: /verify
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true
                                      
                      - match:
                          prefix: /auth/v1/callback
                        route:
                          cluster: auth
                          prefix_rewrite: /callback
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true
                                      
                      - match:
                          prefix: /auth/v1/authorize
                        route:
                          cluster: auth
                          prefix_rewrite: /authorize
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true

                      - match:
                          prefix: /auth/v1/.well-known/jwks.json
                        route:
                          cluster: auth
                          prefix_rewrite: /.well-known/jwks.json
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true

                      - match:
                          prefix: /.well-known/oauth-authorization-server
                        route:
                          cluster: auth
                          prefix_rewrite: /.well-known/oauth-authorization-server
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true

                      - match:
                          prefix: /sso/saml/acs
                        route:
                          cluster: auth
                          prefix_rewrite: /sso/saml/acs
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true

                      - match:
                          prefix: /sso/saml/metadata
                        route:
                          cluster: auth
                          prefix_rewrite: /sso/saml/metadata
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true
                                       
                      - match:
                          prefix: /functions/v1/
                        route:
                          cluster: functions
                          prefix_rewrite: /
                          timeout: 150s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true
                                      
                      - match:
                          prefix: /storage/v1/
                        route:
                          cluster: storage
                          prefix_rewrite: /
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true
                                      
                      - match:
                          prefix: /auth/v1/
                        route:
                          cluster: auth
                          prefix_rewrite: /
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /rest/v1/
                        route:
                          cluster: rest
                          prefix_rewrite: /
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /graphql/v1/
                        route:
                          cluster: rest
                          prefix_rewrite: /rpc/graphql
                          timeout: 30s
                        request_headers_to_add:
                          - header:
                              key: Content-Profile
                              value: graphql_public
                            append: false
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /realtime/v1/api/
                        route:
                          cluster: realtime
                          prefix_rewrite: /api/
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /realtime/v1/
                        route:
                          cluster: realtime
                          prefix_rewrite: /socket/
                          timeout: 30s
                          host_rewrite_literal: realtime-dev.supabase-realtime
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /pg/
                        route:
                          cluster: meta
                          prefix_rewrite: /
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /api/mcp
                        route:
                          cluster: studio
                          prefix_rewrite: /api/mcp
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /mcp
                        route:
                          cluster: studio
                          prefix_rewrite: /api/mcp
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.basic_auth:
                            '@type': >-
                              type.googleapis.com/envoy.config.route.v3.FilterConfig
                            disabled: true
                            
                      - match:
                          prefix: /
                        route:
                          cluster: studio
                          timeout: 30s
                        typed_per_filter_config:
                          envoy.filters.http.rbac:
                            '@type': >-
                              type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBACPerRoute
                            rbac:
                              rules:
                                action: ALLOW
                                policies:
                                  allow_all:
                                    permissions:
                                      - any: true
                                    principals:
                                      - any: true

              http_filters:
                - name: envoy.filters.http.cors
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
                      
                - name: envoy.filters.http.basic_auth
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.basic_auth.v3.BasicAuth
                    users:
                      inline_string: '${DASHBOARD_BASIC_AUTH}'
                      
                # Copies ?apikey=... from the URL into the apikey header when clients omit the header.
                - name: envoy.filters.http.lua
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                    inline_code: |
                      function envoy_on_request(request_handle)
                        local headers = request_handle:headers()
                        if headers:get("apikey") ~= nil then
                          return
                        end

                        local path = headers:get(":path")
                        local query_start = string.find(path, "?", 1, true)
                        if query_start == nil then
                          return
                        end

                        local query = string.sub(path, query_start + 1)
                        for key, value in string.gmatch(query, "([^&]+)=([^&]*)") do
                          if key == "apikey" and value ~= "" then
                            headers:add("apikey", value)
                            return
                          end
                        end
                      end

                # Translates the query parameter apikey into the matching internal JWT and rewrites the URL so only JWTs propagate downstream.
                - name: envoy.filters.http.lua
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                    inline_code: |
                      local SECRET_KEY = "${SUPABASE_SECRET_KEY}"
                      local PUBLISHABLE_KEY = "${SUPABASE_PUBLISHABLE_KEY}"
                      local SERVICE_ROLE_JWT = "${SERVICE_ROLE_KEY_ASYMMETRIC}"
                      local ANON_JWT = "${ANON_KEY_ASYMMETRIC}"
                      local TRANSLATION_ENABLED = SECRET_KEY ~= "" and PUBLISHABLE_KEY ~= "" and SERVICE_ROLE_JWT ~= "" and ANON_JWT ~= ""

                      local function translate_apikey(apikey)
                        if apikey == nil or apikey == "" then
                          return nil
                        end

                        if not TRANSLATION_ENABLED then
                          return nil
                        end

                        if apikey == SECRET_KEY then
                          return SERVICE_ROLE_JWT
                        end

                        if apikey == PUBLISHABLE_KEY then
                          return ANON_JWT
                        end

                        return nil
                      end

                      local function extract_query_apikey(path)
                        if path == nil or path == "" then
                          return nil
                        end

                        local query_start = string.find(path, "?", 1, true)
                        if query_start == nil then
                          return nil
                        end

                        local query = string.sub(path, query_start + 1)
                        for key, value in string.gmatch(query, "([^&]+)=([^&]*)") do
                          if key == "apikey" and value ~= "" then
                            return value
                          end
                        end

                        return nil
                      end

                      local function replace_query_apikey(path, new_value)
                        if path == nil or path == "" or new_value == nil or new_value == "" then
                          return nil
                        end

                        local query_start = string.find(path, "?", 1, true)
                        if query_start == nil then
                          return nil
                        end

                        local base = string.sub(path, 1, query_start)
                        local query = string.sub(path, query_start + 1)
                        local updated = {}
                        local replaced = false

                        for part in string.gmatch(query, "([^&]+)") do
                          local key, value = string.match(part, "([^=]+)=(.*)")
                          if key == "apikey" then
                            part = key .. "=" .. new_value
                            replaced = true
                          end
                          table.insert(updated, part)
                        end

                        if not replaced then
                          return nil
                        end

                        return base .. table.concat(updated, "&")
                      end

                      function envoy_on_request(request_handle)
                        local headers = request_handle:headers()
                        local path = headers:get(":path")
                        local apikey = extract_query_apikey(path)
                        local translated = translate_apikey(apikey)

                        if translated == nil then
                          return
                        end

                        headers:replace("apikey", translated)

                        local rewritten_path = replace_query_apikey(path, translated)
                        if rewritten_path ~= nil then
                          headers:replace(":path", rewritten_path)
                        end
                      end

                # Translates an apikey header into the appropriate internal JWT for downstream RBAC checks.
                - name: envoy.filters.http.lua
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                    inline_code: |
                      local SECRET_KEY = "${SUPABASE_SECRET_KEY}"
                      local PUBLISHABLE_KEY = "${SUPABASE_PUBLISHABLE_KEY}"
                      local SERVICE_ROLE_JWT = "${SERVICE_ROLE_KEY_ASYMMETRIC}"
                      local ANON_JWT = "${ANON_KEY_ASYMMETRIC}"
                      local TRANSLATION_ENABLED = SECRET_KEY ~= "" and PUBLISHABLE_KEY ~= "" and SERVICE_ROLE_JWT ~= "" and ANON_JWT ~= ""

                      local function translate_apikey(apikey)
                        if apikey == nil or apikey == "" then
                          return nil
                        end

                        if not TRANSLATION_ENABLED then
                          return nil
                        end

                        if apikey == SECRET_KEY then
                          return SERVICE_ROLE_JWT
                        end

                        if apikey == PUBLISHABLE_KEY then
                          return ANON_JWT
                        end

                        return nil
                      end

                      function envoy_on_request(request_handle)
                        local headers = request_handle:headers()
                        local translated = translate_apikey(headers:get("apikey"))
                        if translated ~= nil and translated ~= "" then
                          headers:replace("apikey", translated)
                        end
                      end

                # Synthesizes an Authorization header (Bearer …) from apikey when callers don’t provide a real JWT header.
                - name: envoy.filters.http.lua
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                    inline_code: |
                      local function has_real_jwt(auth_header)
                        if auth_header == nil or auth_header == "" then
                          return false
                        end

                        if string.sub(auth_header, 1, 7) ~= "Bearer " then
                          return false
                        end

                        return string.sub(auth_header, 1, 10) ~= "Bearer sb_"
                      end

                      local function format_authorization(value)
                        if value == nil or value == "" then
                          return nil
                        end

                        if string.sub(value, 1, 7) == "Bearer " then
                          return value
                        end

                        return "Bearer " .. value
                      end

                      function envoy_on_request(request_handle)
                        local headers = request_handle:headers()
                        if has_real_jwt(headers:get("authorization")) then
                          return
                        end

                        local apikey = headers:get("apikey")
                        local authorization_value = format_authorization(apikey)
                        if authorization_value ~= nil then
                          headers:replace("authorization", authorization_value)
                        end
                      end

                - name: envoy.filters.http.rbac
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.rbac.v3.RBAC
                    rules:
                      action: ALLOW
                      policies:
                        admin:
                          permissions:
                            - url_path:
                                path:
                                  prefix: /pg/
                          principals:
                            - header:
                                name: apikey
                                string_match:
                                  exact: '${SERVICE_ROLE_KEY}'
                            - header:
                                name: apikey
                                string_match:
                                  exact: '${SERVICE_ROLE_KEY_ASYMMETRIC}'
                        apikey:
                          permissions:
                            - url_path:
                                path:
                                  prefix: /auth/v1/
                            - url_path:
                                path:
                                  prefix: /rest/v1/
                            - url_path:
                                path:
                                  prefix: /realtime/v1/api/
                            - url_path:
                                path:
                                  prefix: /realtime/v1/
                            - url_path:
                                path:
                                  prefix: /graphql/v1/
                          principals:
                            - header:
                                name: apikey
                                string_match:
                                  exact: '${SERVICE_ROLE_KEY}'
                            - header:
                                name: apikey
                                string_match:
                                  exact: '${ANON_KEY}'
                            - header:
                                name: apikey
                                string_match:
                                  exact: '${SERVICE_ROLE_KEY_ASYMMETRIC}'
                            - header:
                                name: apikey
                                string_match:
                                  exact: '${ANON_KEY_ASYMMETRIC}'
                - name: envoy.filters.http.router
                  typed_config:
                    '@type': >-
                      type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
