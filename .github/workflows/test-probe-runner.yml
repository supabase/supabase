name: Probe Runner

on:
  workflow_dispatch:  # this is the key line

jobs:
  probe:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - run: |
          echo "=== OS ==="
          cat /etc/os-release
          echo "=== which yq ==="
          which yq || echo "yq not found"
          echo "=== PATH ==="
          echo "$PATH"
