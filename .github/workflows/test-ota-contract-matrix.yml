name: 'Test: Ota contract matrix'

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'
  push:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'

concurrency:
  group: ota-contract-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OTA_NO_UPDATE_CHECK: '1'
  OTA_GIT_BRANCH: bobai/tool-chain-and-providers

jobs:
  native:
    name: Ota Contract Matrix (Native - ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash
            os: ubuntu-latest
            run_shell: bash
            full_proof: true
          - name: macos-bash
            os: macos-latest
            run_shell: bash
            full_proof: true
          - name: windows-pwsh
            os: windows-latest
            run_shell: pwsh
            full_proof: false
          - name: windows-git-bash
            os: windows-latest
            run_shell: bash
            full_proof: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Activate pnpm via Corepack [bash]
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Activate pnpm via Corepack [pwsh]
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Setup ota (source branch)
        shell: bash
        run: |
          curl -fsSL https://dist.ota.run/install.sh | sh -s -- --from-git --setup-path

      - name: Verify ota install [bash]
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota --version

      - name: Verify ota install [pwsh]
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          ota --version

      - name: Validate contract [bash]
        id: validate_contract_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota validate --json . > ota-validate.json
          ota validate .

      - name: Validate contract [pwsh]
        id: validate_contract_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          & ota validate --json . | Out-File -Encoding utf8 ota-validate.json
          ota validate .

      - name: List app workflow tasks [bash]
        id: tasks_app_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: ota tasks --workflow app .

      - name: List app workflow tasks [pwsh]
        id: tasks_app_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: ota tasks --workflow app .

      - name: List docs workflow tasks [bash]
        id: tasks_docs_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: ota tasks --workflow docs .

      - name: List docs workflow tasks [pwsh]
        id: tasks_docs_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: ota tasks --workflow docs .

      - name: List instant workflow tasks [bash]
        id: tasks_instant_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: ota tasks --workflow instant .

      - name: List instant workflow tasks [pwsh]
        id: tasks_instant_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: ota tasks --workflow instant .

      - name: Export execution topology [bash]
        id: topology_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota execution topology --json . > ota-execution-topology.json
          cat ota-execution-topology.json

      - name: Export execution topology [pwsh]
        id: topology_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          & ota execution topology --json . | Out-File -Encoding utf8 ota-execution-topology.json
          Get-Content ota-execution-topology.json

      - name: Proof instant workflow (readiness + annotations)
        id: proof_instant
        uses: ota-run/action@5c16ae2d2d9de605059f22c3f8e90dba1b29e833 # v1
        with:
          command: proof
          path: .
          workflow: instant
          install: never
          annotate: true
          max-annotations: 20
          comment-pr: false
          fail-on-error: true
          output-path: ota-proof-instant.json

      - name: Proof app workflow [bash]
        id: proof_app_bash
        if: matrix.full_proof && matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota clean . || true
          ota proof runtime --workflow app --json . > ota-proof-app.json
          cat ota-proof-app.json
          ota clean . || true

      - name: Proof app workflow [pwsh]
        id: proof_app_pwsh
        if: matrix.full_proof && matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          & ota clean . *> $null
          try {
            & ota proof runtime --workflow app --json . | Out-File -Encoding utf8 ota-proof-app.json
            Get-Content ota-proof-app.json
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }
          finally {
            & ota clean . *> $null
          }

      - name: Ota matrix summary + annotations
        if: ${{ always() }}
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          VALIDATE_BASH: ${{ steps.validate_contract_bash.outcome }}
          VALIDATE_PWSH: ${{ steps.validate_contract_pwsh.outcome }}
          TASKS_APP_BASH: ${{ steps.tasks_app_bash.outcome }}
          TASKS_APP_PWSH: ${{ steps.tasks_app_pwsh.outcome }}
          TASKS_DOCS_BASH: ${{ steps.tasks_docs_bash.outcome }}
          TASKS_DOCS_PWSH: ${{ steps.tasks_docs_pwsh.outcome }}
          TASKS_INSTANT_BASH: ${{ steps.tasks_instant_bash.outcome }}
          TASKS_INSTANT_PWSH: ${{ steps.tasks_instant_pwsh.outcome }}
          TOPOLOGY_BASH: ${{ steps.topology_bash.outcome }}
          TOPOLOGY_PWSH: ${{ steps.topology_pwsh.outcome }}
          PROOF_INSTANT: ${{ steps.proof_instant.outcome }}
          PROOF_BASH: ${{ steps.proof_app_bash.outcome }}
          PROOF_PWSH: ${{ steps.proof_app_pwsh.outcome }}
        run: |
          {
            echo "## Ota Contract Matrix Summary (${MATRIX_NAME})"
            echo
            echo "| Phase | Outcome |"
            echo "| --- | --- |"
            echo "| Validate contract | ${VALIDATE_BASH:-$VALIDATE_PWSH} |"
            echo "| List app tasks | ${TASKS_APP_BASH:-$TASKS_APP_PWSH} |"
            echo "| List docs tasks | ${TASKS_DOCS_BASH:-$TASKS_DOCS_PWSH} |"
            echo "| List instant tasks | ${TASKS_INSTANT_BASH:-$TASKS_INSTANT_PWSH} |"
            echo "| Export topology | ${TOPOLOGY_BASH:-$TOPOLOGY_PWSH} |"
            echo "| Instant readiness | ${PROOF_INSTANT} |"
            echo "| Proof app workflow | ${PROOF_BASH:-$PROOF_PWSH} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ota-contract-matrix-${{ matrix.name }}
          path: |
            ota-validate.json
            ota-execution-topology.json
            ota-proof-instant.json
            ota-proof-app.json
            .ota/
          retention-days: 7
