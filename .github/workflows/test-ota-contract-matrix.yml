name: 'Test: Ota contract matrix'

on:
  workflow_dispatch:
    inputs:
      ota_ref:
        description: Ota git ref (branch/tag/SHA) to build from source for this run.
        required: false
        default: ''
  pull_request:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'
  push:
    paths:
      - 'ota.yaml'
      - '.github/workflows/test-ota-contract-matrix.yml'

concurrency:
  group: ota-contract-matrix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  OTA_NO_UPDATE_CHECK: '1'

jobs:
  native:
    name: Ota Contract Matrix (Native - ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash
            os: ubuntu-latest
            run_shell: bash
            full_proof: true
          - name: macos-bash
            os: macos-latest
            run_shell: bash
            full_proof: true
          - name: windows-pwsh
            os: windows-latest
            run_shell: pwsh
            full_proof: false
          - name: windows-git-bash
            os: windows-latest
            run_shell: bash
            full_proof: false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Activate pnpm via Corepack [bash]
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Activate pnpm via Corepack [pwsh]
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Setup ota
        if: ${{ github.event.inputs.ota_ref == '' }}
        uses: ota-run/setup@v1

      - name: Setup Rust toolchain (ota_ref)
        if: ${{ github.event.inputs.ota_ref != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Build ota from source (ota_ref)
        if: ${{ github.event.inputs.ota_ref != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          cargo install --locked --force --git https://github.com/ota-run/ota --branch "${{ github.event.inputs.ota_ref }}" ota

      - name: Verify ota install [bash]
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota --version

      - name: Verify ota install [pwsh]
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          ota --version

      - name: Validate contract [bash]
        id: validate_contract_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota validate --json . > ota-validate.json
          ota validate .

      - name: Validate contract [pwsh]
        id: validate_contract_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          & ota validate --json . | Out-File -Encoding utf8 ota-validate.json
          ota validate .

      - name: List app workflow tasks [bash]
        id: tasks_app_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: ota tasks --workflow app .

      - name: List app workflow tasks [pwsh]
        id: tasks_app_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: ota tasks --workflow app .

      - name: List docs workflow tasks [bash]
        id: tasks_docs_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: ota tasks --workflow docs .

      - name: List docs workflow tasks [pwsh]
        id: tasks_docs_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: ota tasks --workflow docs .

      - name: List instant workflow tasks [bash]
        id: tasks_instant_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: ota tasks --workflow instant .

      - name: List instant workflow tasks [pwsh]
        id: tasks_instant_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: ota tasks --workflow instant .

      - name: Export execution topology [bash]
        id: topology_bash
        if: matrix.run_shell == 'bash'
        shell: bash
        run: |
          ota execution topology --json . > ota-execution-topology.json
          cat ota-execution-topology.json

      - name: Export execution topology [pwsh]
        id: topology_pwsh
        if: matrix.run_shell == 'pwsh'
        shell: pwsh
        run: |
          & ota execution topology --json . | Out-File -Encoding utf8 ota-execution-topology.json
          Get-Content ota-execution-topology.json

      - name: Doctor instant workflow + annotations [bash]
        id: doctor_instant_bash
        if: matrix.run_shell == 'bash'
        continue-on-error: true
        shell: bash
        run: |
          set +e
          ota doctor --workflow instant --json . > ota-doctor-instant.json
          doctor_status=$?
          set -e
          ota annotations --mode doctor --format github --input ota-doctor-instant.json
          exit $doctor_status

      - name: Doctor instant workflow + annotations [pwsh]
        id: doctor_instant_pwsh
        if: matrix.run_shell == 'pwsh'
        continue-on-error: true
        shell: pwsh
        run: |
          & ota doctor --workflow instant --json . | Out-File -Encoding utf8 ota-doctor-instant.json
          $doctor_status = $LASTEXITCODE
          ota annotations --mode doctor --format github --input ota-doctor-instant.json
          if ($doctor_status -ne 0) {
            exit $doctor_status
          }

      - name: Proof instant workflow (readiness + annotations)
        id: proof_instant
        if: matrix.run_shell == 'bash'
        continue-on-error: true
        shell: bash
        run: |
          ota clean . || true
          ota proof runtime --workflow instant --json . > ota-proof-instant.json
          cat ota-proof-instant.json
          ota clean . || true

      - name: Proof instant workflow (readiness + annotations) [pwsh]
        id: proof_instant_pwsh
        if: matrix.run_shell == 'pwsh'
        continue-on-error: true
        timeout-minutes: 20
        shell: pwsh
        run: |
          $proofOut = "ota-proof-instant.json"
          $proofErr = "ota-proof-instant.stderr.log"
          $proofTimeoutFlag = "ota-proof-timeout.flag"
          if (Test-Path $proofOut) { Remove-Item $proofOut -Force }
          if (Test-Path $proofErr) { Remove-Item $proofErr -Force }
          if (Test-Path $proofTimeoutFlag) { Remove-Item $proofTimeoutFlag -Force }

          $proc = Start-Process `
            -FilePath "ota" `
            -ArgumentList @("proof", "runtime", "--workflow", "instant", "--json", ".") `
            -NoNewWindow `
            -RedirectStandardOutput $proofOut `
            -RedirectStandardError $proofErr `
            -PassThru

          $finished = $proc.WaitForExit(600000)
          if (-not $finished) {
            taskkill /PID $proc.Id /T /F | Out-Null
            "1" | Out-File -FilePath $proofTimeoutFlag -Encoding utf8
            Write-Output "::error title=Instant proof timed out in matrix wrapper::ota proof runtime exceeded 10 minutes. See ota-proof-instant.stderr.log and ./.ota/proof/instant/up-detached-run.log"
            if (Test-Path $proofErr) { Get-Content $proofErr }
            exit 124
          }

          if (Test-Path $proofOut) { Get-Content $proofOut }
          if (Test-Path $proofErr) { Get-Content $proofErr }
          if ($proc.ExitCode -ne 0) {
            exit $proc.ExitCode
          }

      - name: Proof app workflow [bash]
        id: proof_app_bash
        if: matrix.full_proof && matrix.run_shell == 'bash'
        continue-on-error: true
        shell: bash
        run: |
          ota clean . || true
          ota proof runtime --workflow app --json . > ota-proof-app.json
          cat ota-proof-app.json
          ota clean . || true

      - name: Proof app workflow [pwsh]
        id: proof_app_pwsh
        if: matrix.full_proof && matrix.run_shell == 'pwsh'
        continue-on-error: true
        timeout-minutes: 12
        shell: pwsh
        run: |
          & ota proof runtime --workflow app --json . | Out-File -Encoding utf8 ota-proof-app.json
          Get-Content ota-proof-app.json
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Classify instant proof failure [bash]
        id: classify_proof_instant_bash
        if: ${{ always() && matrix.run_shell == 'bash' }}
        shell: bash
        run: |
          classification="none"
          detail=""
          if [ "${{ steps.proof_instant.outcome }}" = "failure" ]; then
            classification="readiness_failure"
            detail="Instant proof failed before readiness completed."
            if [ -f ./.ota/proof/instant/up-detached-run.log ] && rg -q "node-gyp|gyp ERR|error C[0-9]{4}|ELIFECYCLE|Local package.json exists, but node_modules missing|turbo: not found|not recognized as an internal or external command" ./.ota/proof/instant/up-detached-run.log; then
              classification="install_or_toolchain_failure"
              detail="Install/toolchain build failed during proof run."
            fi
          fi
          echo "classification=$classification" >> "$GITHUB_OUTPUT"
          echo "detail=$detail" >> "$GITHUB_OUTPUT"
          if [ "$classification" = "install_or_toolchain_failure" ]; then
            echo "::error title=Instant proof blocked by install/toolchain::${detail} See ./.ota/proof/instant/up-detached-run.log"
          elif [ "$classification" = "readiness_failure" ]; then
            echo "::error title=Instant proof blocked by readiness::${detail} See ota-proof-instant.json and ./.ota/proof/instant/up.log"
          fi

      - name: Classify instant proof failure [pwsh]
        id: classify_proof_instant_pwsh
        if: ${{ always() && matrix.run_shell == 'pwsh' }}
        shell: pwsh
        run: |
          $classification = "none"
          $detail = ""
          if ("${{ steps.proof_instant_pwsh.outcome }}" -eq "failure") {
            $classification = "readiness_failure"
            $detail = "Instant proof failed before readiness completed."
            if (Test-Path "ota-proof-timeout.flag") {
              $classification = "proof_timeout"
              $detail = "Instant proof exceeded the matrix wrapper timeout (10 minutes)."
            }
            $logPath = ".\.ota\proof\instant\up-detached-run.log"
            if ($classification -ne "proof_timeout" -and (Test-Path $logPath)) {
              $pattern = "node-gyp|gyp ERR|error C[0-9]{4}|ELIFECYCLE|Local package.json exists, but node_modules missing|turbo: not found|not recognized as an internal or external command"
              if (Select-String -Path $logPath -Pattern $pattern -Quiet) {
                $classification = "install_or_toolchain_failure"
                $detail = "Install/toolchain build failed during proof run."
              }
            }
          }
          "classification=$classification" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "detail=$detail" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($classification -eq "install_or_toolchain_failure") {
            Write-Output "::error title=Instant proof blocked by install/toolchain::$detail See ./.ota/proof/instant/up-detached-run.log"
          } elseif ($classification -eq "proof_timeout") {
            Write-Output "::error title=Instant proof hit matrix timeout::$detail See ota-proof-instant.stderr.log and ./.ota/proof/instant/up-detached-run.log"
          } elseif ($classification -eq "readiness_failure") {
            Write-Output "::error title=Instant proof blocked by readiness::$detail See ota-proof-instant.json and ./.ota/proof/instant/up.log"
          }

      - name: Ota matrix summary + annotations
        if: ${{ always() }}
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          VALIDATE_BASH: ${{ steps.validate_contract_bash.outcome }}
          VALIDATE_PWSH: ${{ steps.validate_contract_pwsh.outcome }}
          TASKS_APP_BASH: ${{ steps.tasks_app_bash.outcome }}
          TASKS_APP_PWSH: ${{ steps.tasks_app_pwsh.outcome }}
          TASKS_DOCS_BASH: ${{ steps.tasks_docs_bash.outcome }}
          TASKS_DOCS_PWSH: ${{ steps.tasks_docs_pwsh.outcome }}
          TASKS_INSTANT_BASH: ${{ steps.tasks_instant_bash.outcome }}
          TASKS_INSTANT_PWSH: ${{ steps.tasks_instant_pwsh.outcome }}
          TOPOLOGY_BASH: ${{ steps.topology_bash.outcome }}
          TOPOLOGY_PWSH: ${{ steps.topology_pwsh.outcome }}
          DOCTOR_INSTANT_BASH: ${{ steps.doctor_instant_bash.outcome }}
          DOCTOR_INSTANT_PWSH: ${{ steps.doctor_instant_pwsh.outcome }}
          PROOF_INSTANT: ${{ steps.proof_instant.outcome }}
          PROOF_INSTANT_PWSH: ${{ steps.proof_instant_pwsh.outcome }}
          PROOF_FAILURE_CLASS_BASH: ${{ steps.classify_proof_instant_bash.outputs.classification }}
          PROOF_FAILURE_DETAIL_BASH: ${{ steps.classify_proof_instant_bash.outputs.detail }}
          PROOF_FAILURE_CLASS_PWSH: ${{ steps.classify_proof_instant_pwsh.outputs.classification }}
          PROOF_FAILURE_DETAIL_PWSH: ${{ steps.classify_proof_instant_pwsh.outputs.detail }}
          PROOF_BASH: ${{ steps.proof_app_bash.outcome }}
          PROOF_PWSH: ${{ steps.proof_app_pwsh.outcome }}
        run: |
          proof_failure_class="${PROOF_FAILURE_CLASS_BASH:-$PROOF_FAILURE_CLASS_PWSH}"
          proof_failure_detail="${PROOF_FAILURE_DETAIL_BASH:-$PROOF_FAILURE_DETAIL_PWSH}"
          if [ -z "$proof_failure_class" ]; then
            proof_failure_class="n/a"
          fi
          if [ -z "$proof_failure_detail" ]; then
            proof_failure_detail="n/a"
          fi
          {
            echo "## Ota Contract Matrix Summary (${MATRIX_NAME})"
            echo
            echo "| Phase | Outcome |"
            echo "| --- | --- |"
            echo "| Validate contract | ${VALIDATE_BASH:-$VALIDATE_PWSH} |"
            echo "| List app tasks | ${TASKS_APP_BASH:-$TASKS_APP_PWSH} |"
            echo "| List docs tasks | ${TASKS_DOCS_BASH:-$TASKS_DOCS_PWSH} |"
            echo "| List instant tasks | ${TASKS_INSTANT_BASH:-$TASKS_INSTANT_PWSH} |"
            echo "| Export topology | ${TOPOLOGY_BASH:-$TOPOLOGY_PWSH} |"
            echo "| Doctor instant (+ annotations) | ${DOCTOR_INSTANT_BASH:-$DOCTOR_INSTANT_PWSH} |"
            echo "| Instant readiness | ${PROOF_INSTANT:-$PROOF_INSTANT_PWSH} |"
            echo "| Instant failure class | ${proof_failure_class} (${proof_failure_detail}) |"
            echo "| Proof app workflow | ${PROOF_BASH:-$PROOF_PWSH} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"


      - name: Upload failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ota-contract-matrix-${{ matrix.name }}
          include-hidden-files: true
          path: |
            ota-validate.json
            ota-execution-topology.json
            ota-doctor-instant.json
            ota-proof-instant.json
            ota-proof-app.json
            .ota/
          retention-days: 7

  container:
    name: Ota Contract Matrix (Container - ${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-bash-docker
            os: ubuntu-latest
          - name: macos-bash-docker
            os: macos-latest
          - name: windows-pwsh-docker
            os: windows-latest
          - name: windows-git-bash-docker
            os: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup ota
        if: ${{ github.event.inputs.ota_ref == '' }}
        uses: ota-run/setup@v1

      - name: Setup Rust toolchain (ota_ref)
        if: ${{ github.event.inputs.ota_ref != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Build ota from source (ota_ref)
        if: ${{ github.event.inputs.ota_ref != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          cargo install --locked --force --git https://github.com/ota-run/ota --branch "${{ github.event.inputs.ota_ref }}" ota

      - name: Verify ota install
        shell: bash
        run: ota --version

      - name: Verify Docker engine availability
        id: docker_capability
        shell: bash
        run: |
          if ! command -v docker >/dev/null 2>&1; then
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "reason=docker-cli-missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          docker --version
          if ! docker info >/tmp/docker-info.log 2>&1; then
            cat /tmp/docker-info.log
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "reason=docker-engine-unavailable" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          os_type="$(docker info --format '{{.OSType}}' 2>/dev/null || true)"
          if [ "$os_type" != "linux" ]; then
            echo "supported=false" >> "$GITHUB_OUTPUT"
            echo "reason=docker-ostype-$os_type" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "supported=true" >> "$GITHUB_OUTPUT"
          echo "reason=ok" >> "$GITHUB_OUTPUT"

      - name: Skip unsupported container runner
        if: steps.docker_capability.outputs.supported != 'true'
        shell: bash
        env:
          DOCKER_CAPABILITY_REASON: ${{ steps.docker_capability.outputs.reason }}
        run: |
          echo "::notice title=Container matrix skipped::Runner does not support Linux container execution for this contract (${DOCKER_CAPABILITY_REASON:-unknown})."

      - name: Validate contract
        id: validate_contract
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: |
          ota validate --json . > ota-validate-container.json
          ota validate .

      - name: List app:container workflow tasks
        id: tasks_app_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: ota tasks --workflow app:container .

      - name: List docs:container workflow tasks
        id: tasks_docs_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: ota tasks --workflow docs:container .

      - name: List instant:container workflow tasks
        id: tasks_instant_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: ota tasks --workflow instant:container .

      - name: Export execution topology
        id: topology_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: |
          ota execution topology --json . > ota-execution-topology-container.json
          cat ota-execution-topology-container.json

      - name: Container dry-run preview (app:container)
        id: dry_run_app_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: ota up --workflow app:container --mode container --dry-run .

      - name: Container dry-run preview (docs:container)
        id: dry_run_docs_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: ota up --workflow docs:container --mode container --dry-run .

      - name: Container dry-run preview (instant:container)
        id: dry_run_instant_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: ota up --workflow instant:container --mode container --dry-run .

      - name: Proof instant:container workflow (readiness + annotations)
        id: proof_instant_container
        if: steps.docker_capability.outputs.supported == 'true'
        shell: bash
        run: |
          ota clean . || true
          set +e
          ota proof runtime --mode container --workflow instant:container --json . > ota-proof-instant-container.json
          proof_status=$?
          set -e
          cat ota-proof-instant-container.json
          if [ "$proof_status" -ne 0 ]; then
            if grep -q '"error": "Container readiness does not include host-only checks"' ota-proof-instant-container.json; then
              echo "::notice title=Container proof returned host-only-check info::Treating this as non-blocking for container matrix signal."
            else
              exit "$proof_status"
            fi
          fi
          ota clean . || true

      - name: Ota container matrix summary
        if: ${{ always() }}
        shell: bash
        env:
          MATRIX_NAME: ${{ matrix.name }}
          DOCKER_CAPABILITY: ${{ steps.docker_capability.outputs.supported }}
          DOCKER_CAPABILITY_REASON: ${{ steps.docker_capability.outputs.reason }}
          VALIDATE: ${{ steps.validate_contract.outcome }}
          TASKS_APP: ${{ steps.tasks_app_container.outcome }}
          TASKS_DOCS: ${{ steps.tasks_docs_container.outcome }}
          TASKS_INSTANT: ${{ steps.tasks_instant_container.outcome }}
          TOPOLOGY: ${{ steps.topology_container.outcome }}
          DRY_RUN_APP: ${{ steps.dry_run_app_container.outcome }}
          DRY_RUN_DOCS: ${{ steps.dry_run_docs_container.outcome }}
          DRY_RUN_INSTANT: ${{ steps.dry_run_instant_container.outcome }}
          PROOF_INSTANT: ${{ steps.proof_instant_container.outcome }}
        run: |
          {
            echo "## Ota Contract Matrix Summary (${MATRIX_NAME})"
            echo
            echo "| Phase | Outcome |"
            echo "| --- | --- |"
            echo "| Docker capability (linux containers) | ${DOCKER_CAPABILITY:-false} (${DOCKER_CAPABILITY_REASON:-unknown}) |"
            echo "| Validate contract | ${VALIDATE} |"
            echo "| List app:container tasks | ${TASKS_APP} |"
            echo "| List docs:container tasks | ${TASKS_DOCS} |"
            echo "| List instant:container tasks | ${TASKS_INSTANT} |"
            echo "| Export topology | ${TOPOLOGY} |"
            echo "| Dry-run app:container | ${DRY_RUN_APP} |"
            echo "| Dry-run docs:container | ${DRY_RUN_DOCS} |"
            echo "| Dry-run instant:container | ${DRY_RUN_INSTANT} |"
            echo "| Proof instant:container | ${PROOF_INSTANT} |"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload container failure artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ota-contract-matrix-container-${{ matrix.name }}
          include-hidden-files: true
          path: |
            ota-validate-container.json
            ota-execution-topology-container.json
            ota-proof-instant-container.json
            .ota/
          retention-days: 7

  strict-e2e-ubuntu:
    name: Ota Contract Matrix (Strict E2E - ubuntu-bash)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Activate pnpm via Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Setup ota
        if: ${{ github.event.inputs.ota_ref == '' }}
        uses: ota-run/setup@v1

      - name: Setup Rust toolchain (ota_ref)
        if: ${{ github.event.inputs.ota_ref != '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Build ota from source (ota_ref)
        if: ${{ github.event.inputs.ota_ref != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${HOME}/.cargo/bin" >> "$GITHUB_PATH"
          cargo install --locked --force --git https://github.com/ota-run/ota --branch "${{ github.event.inputs.ota_ref }}" ota

      - name: Verify ota install
        shell: bash
        run: ota --version

      - name: Strict run/up parity (native + container)
        shell: bash
        run: |
          set -euo pipefail

          cleanup_state() {
            ota clean . >/dev/null 2>&1 || true
            if command -v lsof >/dev/null 2>&1; then
              lsof -tiTCP:3000 -sTCP:LISTEN | xargs -r kill -9 || true
            fi
          }

          assert_ready() {
            local port="$1"
            curl -fsS --max-time 5 "http://127.0.0.1:${port}/" >/dev/null
          }

          run_warmup_install() {
            local label="$1"
            shift
            local logfile="strict-${label}.log"
            echo "::group::${label}"
            set +e
            timeout --kill-after=30s 900s "$@" >"${logfile}" 2>&1
            local rc=$?
            set -e
            cat "${logfile}"
            if [ "${rc}" -ne 0 ]; then
              echo "::error title=${label} failed::See ${logfile}"
              exit "${rc}"
            fi
            echo "::endgroup::"
          }

          run_e2e_cmd() {
            local label="$1"
            local port="$2"
            local limit_seconds="$3"
            shift 3
            local logfile="strict-${label}.log"
            local ready=0

            cleanup_state
            echo "::group::${label}"
            "$@" >"${logfile}" 2>&1 &
            local cmd_pid=$!
            local elapsed=0

            while [ "${elapsed}" -lt "${limit_seconds%?}" ]; do
              if assert_ready "${port}"; then
                ready=1
                break
              fi
              if ! kill -0 "${cmd_pid}" >/dev/null 2>&1; then
                break
              fi
              sleep 2
              elapsed=$((elapsed + 2))
            done

            if [ "${ready}" -eq 1 ]; then
              kill -TERM "${cmd_pid}" >/dev/null 2>&1 || true
              sleep 1
              kill -KILL "${cmd_pid}" >/dev/null 2>&1 || true
              wait "${cmd_pid}" >/dev/null 2>&1 || true
              cat "${logfile}"
              echo "::endgroup::"
              cleanup_state
              return 0
            fi

            if kill -0 "${cmd_pid}" >/dev/null 2>&1; then
              kill -TERM "${cmd_pid}" >/dev/null 2>&1 || true
              sleep 1
              kill -KILL "${cmd_pid}" >/dev/null 2>&1 || true
            fi

            wait "${cmd_pid}" >/dev/null 2>&1 || true
            cat "${logfile}"
            if [ "${elapsed}" -ge "${limit_seconds%?}" ]; then
              echo "::error title=${label} timed out before readiness::See ${logfile}"
              exit 124
            fi

            echo "::error title=${label} failed before readiness::See ${logfile}"
            exit 1

            echo "::endgroup::"
            cleanup_state
          }

          docker --version
          docker info

          cleanup_state
          run_warmup_install "warmup-install-native" ota run --native install .

          run_e2e_cmd "run-native" 3000 360s ota run --native dev:www .
          run_e2e_cmd "run-native-stream" 3000 360s ota run --native --stream dev:www .
          run_e2e_cmd "up-native" 3000 360s ota up --native .
          run_e2e_cmd "up-native-stream" 3000 360s ota up --native --stream .

          cleanup_state
          run_warmup_install "warmup-install-container" ota run --container install .

          run_e2e_cmd "run-container" 3000 360s ota run --container dev:www .
          run_e2e_cmd "run-container-stream" 3000 360s ota run --container --stream dev:www .
          run_e2e_cmd "up-container" 3000 360s ota up --container .
          run_e2e_cmd "up-container-stream" 3000 360s ota up --container --stream .

      - name: Upload strict e2e artifacts
        if: ${{ failure() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ota-contract-matrix-strict-e2e-ubuntu
          include-hidden-files: true
          path: |
            strict-*.log
            .ota/
          retention-days: 7
