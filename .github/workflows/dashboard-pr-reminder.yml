name: Dashboard PR Reminder

on:
  schedule:
    # Run at 10am Singapore Time (2am UTC)
    - cron: '0 2 * * *'
    # Run at 10am US Eastern Time (2pm UTC = 10am EDT / 9am EST)
    - cron: '0 14 * * *'
  workflow_dispatch: # Allow manual trigger for testing

permissions:
  pull-requests: read
  contents: read

jobs:
  check-dashboard-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Find stale Dashboard PRs and notify Slack
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DASHBOARD_WEBHOOK_URL }}
        run: npx tsx scripts/actions/find-stale-dashboard-prs.ts | npx tsx scripts/actions/send-slack-pr-notification.ts
