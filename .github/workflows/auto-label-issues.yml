name: Auto Label Issues
on:
  issues:
    types: [opened, reopened]
jobs:
  check-external:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check if organization member
        id: is-org-member
        uses: JamesSingleton/is-organization-member@39c59b3b17cca4eb75c81772b95e724e2a24c025 # v1.0.0
        with:
          organization: ${{ github.repository_owner }}
          username: ${{ github.event.issue.user.login }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: label-member
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          IS_INTERNAL: ${{ steps.is-org-member.outputs.result }}
        run: |
          if [ "$IS_INTERNAL" != "true" ]; then
            echo "User is outside of organization, labeling external"
            gh issue edit "$NUMBER" --add-label "external-issue"
          else
            echo "User is within the organization, labeling internal"
            gh issue edit "$NUMBER" --add-label "internal-issue"
          fi
  triage-new:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          LABELS: to-triage
        run: |
          echo "Applying triage label for new issue"
          gh issue edit "$NUMBER" --add-label "$LABELS"
  spam-detection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check GitHub Issue for spam
        env:
          POST_URL: ${{ secrets.POST_URL }}
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          NUMBER: ${{ github.event.issue.number }}
        run: |
          RESPONSE=$(curl -s -X POST "$POST_URL" \
            -H "Authorization: Bearer $BEARER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"issue_id": $NUMBER}')
          echo "spam_response=$RESPONSE" >> $GITHUB_OUTPUT
      - name: Use spam detector output to label issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.issue.number }}
          LABEL: flagged
        run: |
          IS_SPAM=$(echo "$SPAM_RESPONSE" | jq -r '.spam')
          if [ "$IS_SPAM" == "true" ]; then
            echo "Applying flagged label for new issue suspected of spam"
            gh issue edit "$NUMBER" --add-label "$LABEL"
          fi

  welcome-first-time:
    if: github.event.action == 'opened' && !contains(fromJson('["dependabot[bot]", "github-actions[bot]", "renovate[bot]"]'), github.actor)
    runs-on: ubuntu-latest
    permissions:
      issues: write
    env:
      WELCOME_MSG: |
        Welcome to the Supabase community! 🎉 Thank you for reporting your first issue.

        A few tips to help us help you faster:
        - Search existing issues to avoid duplicates.
        - Include steps to reproduce, expected vs. actual behavior, and your environment (OS, browser, Supabase version).
        - Check out our [contributing guidelines](https://github.com/supabase/supabase/blob/master/CONTRIBUTING.md) for more details.

        Our team and the community will look into this shortly!
    steps:
      - name: Post welcome comment for first-time issue reporters
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const sender = context.payload.issue.user.login;
            const number = context.payload.issue.number;

            const query = `query($owner:String!, $name:String!, $contributor:String!) {
              repository(owner:$owner, name:$name) {
                issues(first: 2, filterBy: {createdBy:$contributor, states:[OPEN, CLOSED]}) {
                  totalCount
                }
              }
            }`;
            
            const variables = {
              owner: context.repo.owner,
              name: context.repo.repo,
              contributor: sender
            };

            const result = await github.graphql(query, variables);
            const totalCount = result.repository.issues.totalCount;

            if (totalCount !== 1) {
              console.log(`Not ${sender}'s first issue (total: ${totalCount}). Skipping.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: process.env.WELCOME_MSG
            });