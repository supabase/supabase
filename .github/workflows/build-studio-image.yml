name: Build self-hosted Studio image

# Builds THIS fork's Studio image (with the "Sites" web-hosting + self-hosted
# edge-function management features) and pushes it to the GitHub Container
# Registry (GHCR). Small servers can then PULL it instead of building on-host:
#
#   sudo bash docker/install.sh --studio-image ghcr.io/<owner>/supabase-studio:fork
#
# Trigger it manually from the Actions tab (workflow_dispatch). After the first
# successful run, make the GHCR package public (Packages → settings) OR run
# `docker login ghcr.io` on the server so `docker compose pull` can fetch it.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. fork, v1, a date)"
        default: "fork"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image reference
        id: img
        run: echo "ref=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/supabase-studio" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (target=production)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/studio/Dockerfile
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.img.outputs.ref }}:${{ inputs.tag }}
            ${{ steps.img.outputs.ref }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "Pushed: ${{ steps.img.outputs.ref }}:${{ inputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Use on the server:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "sudo bash docker/install.sh --studio-image ${{ steps.img.outputs.ref }}:${{ inputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
