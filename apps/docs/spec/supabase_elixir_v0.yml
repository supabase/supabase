  - id: update-bucket
    title: "Update a bucket"
    description: |
      Updates the properties of an existing bucket.
    notes: |
      - Returns `{:ok, map()}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: bucket_id
        isOptional: false
        type: String.t()
        description: The bucket ID to update
      - name: options
        isOptional: false
        type: map()
        description: The bucket properties to update
    examples:
      - id: update-bucket
        name: Update a bucket
        code: |
          ```elixir
          {:ok, _} = Supabase.Storage.update_bucket(client, "avatars", %{
            public: false
          })
          ```

  - id: empty-bucket
    title: "Empty a bucket"
    description: |
      Removes all files inside a bucket without deleting the bucket itself.
    notes: |
      - Returns `:ok` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: bucket_id
        isOptional: false
        type: String.t()
        description: The bucket ID to empty
    examples:
      - id: empty-bucket
        name: Empty a bucket
        code: |
          ```elixir
          :ok = Supabase.Storage.empty_bucket(client, "avatars")
          ```

  - id: delete-bucket
    title: "Delete a bucket"
    description: |
      Deletes an existing bucket. The bucket must be empty before it can be deleted.
    notes: |
      - Returns `:ok` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: bucket_id
        isOptional: false
        type: String.t()
        description: The bucket ID to delete
    examples:
      - id: delete-bucket
        name: Delete a bucket
        code: |
          ```elixir
          :ok = Supabase.Storage.delete_bucket(client, "avatars")
          ```

  - id: from-upload
    title: "Upload a file"
    description: |
      Uploads a file to a storage bucket. First create a bucket-scoped storage reference with `Storage.from/2`, then call `upload/4` on it.
    notes: |
      - Returns `{:ok, map()}` on success (includes the file key) or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: file_path
        isOptional: false
        type: Path.t()
        description: The local file path on disk
      - name: object_path
        isOptional: false
        type: Path.t()
        description: The destination path within the bucket
      - name: options
        isOptional: true
        type: Enumerable.t()
        description: Upload options (e.g., content type, cache control)
    examples:
      - id: upload-file
        name: Upload a file
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, result} = Supabase.Storage.File.upload(storage, "/path/to/avatar.png", "public/avatar.png")
          ```

  - id: from-download
    title: "Download a file"
    description: |
      Downloads a file from a storage bucket.
    notes: |
      - Returns `{:ok, binary()}` on success (the file contents) or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: path
        isOptional: false
        type: Path.t()
        description: The file path within the bucket
      - name: options
        isOptional: true
        type: keyword()
        description: Download options
        subContent:
          - name: transform
            isOptional: true
            type: Enumerable.t() | nil
            description: Image transformation options
    examples:
      - id: download-file
        name: Download a file
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, binary} = Supabase.Storage.File.download(storage, "public/avatar.png")
          ```

  - id: from-list
    title: "List all files in a bucket"
    description: |
      Lists all files in a storage bucket, optionally filtered by path prefix.
    notes: |
      - Returns `{:ok, [map()]}` on success (list of file metadata) or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: prefix
        isOptional: true
        type: Path.t() | nil
        description: Filter by path prefix
      - name: options
        isOptional: true
        type: Enumerable.t()
        description: List options
        subContent:
          - name: limit
            isOptional: true
            type: integer()
            description: Maximum number of files to return
          - name: offset
            isOptional: true
            type: integer()
            description: Offset for pagination
    examples:
      - id: list-files
        name: List files in a bucket
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, files} = Supabase.Storage.File.list(storage, "public/")
          ```

  - id: from-update
    title: "Replace an existing file"
    description: |
      Replaces an existing file at the specified path.
    notes: |
      - Returns `{:ok, map()}` on success (includes the file key) or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: file_path
        isOptional: false
        type: Path.t()
        description: The new local file path on disk
      - name: object_path
        isOptional: false
        type: Path.t()
        description: The destination path within the bucket
      - name: options
        isOptional: true
        type: Enumerable.t()
        description: Upload options (e.g., content type, cache control)
    examples:
      - id: update-file
        name: Replace a file
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, result} = Supabase.Storage.File.update(storage, "/path/to/new-avatar.png", "public/avatar.png")
          ```

  - id: from-move
    title: "Move an existing file"
    description: |
      Moves a file from one path to another within the same bucket or to a different bucket.
    notes: |
      - Returns `{:ok, :moved}` on success or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: options
        isOptional: false
        type: keyword()
        description: Move options
        subContent:
          - name: from
            isOptional: false
            type: Path.t()
            description: Source file path
          - name: to
            isOptional: false
            type: Path.t()
            description: Destination file path
          - name: destination_bucket
            isOptional: true
            type: String.t() | nil
            description: Target bucket (defaults to the same bucket)
    examples:
      - id: move-file
        name: Move a file
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, :moved} = Supabase.Storage.File.move(storage, from: "old/avatar.png", to: "new/avatar.png")
          ```

  - id: from-copy
    title: "Copy an existing file"
    description: |
      Copies a file from one path to another within the same bucket or to a different bucket.
    notes: |
      - Returns `{:ok, :moved}` on success or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: options
        isOptional: false
        type: keyword()
        description: Copy options
        subContent:
          - name: from
            isOptional: false
            type: Path.t()
            description: Source file path
          - name: to
            isOptional: false
            type: Path.t()
            description: Destination file path
          - name: destination_bucket
            isOptional: true
            type: String.t() | nil
            description: Target bucket (defaults to the same bucket)
    examples:
      - id: copy-file
        name: Copy a file
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, :moved} = Supabase.Storage.File.copy(storage, from: "original.png", to: "backup/original.png")
          ```

  - id: from-remove
    title: "Delete files in a bucket"
    description: |
      Deletes one or more files from a storage bucket.
    notes: |
      - Returns `{:ok, [map()]}` on success or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: paths
        isOptional: false
        type: "[Path.t()]"
        description: List of file paths to delete (or a single path string)
    examples:
      - id: remove-files
        name: Delete files
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, _} = Supabase.Storage.File.remove(storage, ["public/avatar.png", "public/old.png"])
          ```

  - id: from-create-signed-url
    title: "Create a signed URL"
    description: |
      Creates a signed URL for temporary access to a private file.
    notes: |
      - Returns `{:ok, String.t()}` on success (the signed URL) or `{:error, reason}` on failure.
    params:
      - name: storage
        isOptional: false
        type: Supabase.Storage.t()
        description: A bucket-scoped storage reference created via `Supabase.Storage.from(client, bucket_id)`
      - name: path
        isOptional: false
        type: Path.t()
        description: The file path
      - name: options
        isOptional: true
        type: keyword()
        description: Signed URL options
        subContent:
          - name: expires_in
            isOptional: false
            type: integer()
            description: Expiration time in seconds
          - name: download
            isOptional: true
            type: boolean() | String.t() | nil
            description: Set to trigger a download or provide a custom filename
          - name: transform
            isOptional: true
            type: Enumerable.t() | nil
            description: Image transformation options
    examples:
      - id: create-signed-url
        name: Create a signed URL
        code: |
          ```elixir
          storage = Supabase.Storage.from(client, "avatars")
          {:ok, url} = Supabase.Storage.File.create_signed_url(storage, "private/avatar.png", expires_in: 3600)
          ```

