openref: 0.1

info:
  id: reference/supabase-elixir
  title: Supabase Elixir Client
  description: |
    Supabase Elixir.
  definition: spec/enrichments/tsdoc_v2/combined.json
  slugPrefix: '/'
  specUrl: https://github.com/supabase/supabase/edit/master/apps/docs/spec/supabase_elixir_v0.yml
  libraries:
    - name: 'Elixir'
      id: 'elixir'
      version: '1.0.0'

functions:
  # ──────────────────────────────────────────────────
  # Main Library (supabase_potion)
  # ──────────────────────────────────────────────────

  - id: initializing
    title: Initializing
    description: |
      You can initialize a new Supabase client using `Supabase.init_client/2` or `Supabase.init_client/3`.

      supabase-ex provides two patterns:

      1. **Module-based client (recommended)**: Define a client module with `use Supabase.Client, otp_app: :my_app`. This reads configuration from your application config and builds a fresh client struct on each call to `get_client!/0`. No supervision tree needed.

      2. **Direct initialization**: Create clients on-demand with `Supabase.init_client/3`. The client is returned as a lightweight struct.

      A default Finch HTTP pool is started automatically. You can point to your own Finch instance or swap in a completely different HTTP adapter via application config.

    params:
      - name: base_url
        isOptional: false
        type: String.t()
        description: The unique Supabase URL for your project (e.g., `https://xyzcompany.supabase.co`)
      - name: api_key
        isOptional: false
        type: String.t()
        description: The unique Supabase API key (anon key or service role key)
      - name: options
        isOptional: true
        type: keyword()
        description: Configuration options for the client
        subContent:
          - name: db
            isOptional: true
            type: keyword()
            description: Database configuration options
            subContent:
              - name: schema
                isOptional: true
                type: String.t()
                description: Database schema name (default `"public"`)
          - name: auth
            isOptional: true
            type: keyword()
            description: Authentication configuration options
            subContent:
              - name: auto_refresh_token
                isOptional: true
                type: boolean()
                description: Automatically refresh access tokens (default `true`)
              - name: persist_session
                isOptional: true
                type: boolean()
                description: Persist session to storage (default `true`)
              - name: detect_session_in_url
                isOptional: true
                type: boolean()
                description: Detect session in URL (default `true`)
              - name: flow_type
                isOptional: true
                type: atom()
                description: "OAuth flow type - `:implicit`, `:pkce`, or `:magicLink` (default `:implicit`)"
              - name: debug
                isOptional: true
                type: boolean()
                description: Enable debug logging for auth operations (default `false`)
              - name: storage_key
                isOptional: true
                type: String.t()
                description: "Storage key for persisting session (default `\"sb-<host>-auth-token\"`)"
          - name: global
            isOptional: true
            type: keyword()
            description: Global client configuration
            subContent:
              - name: headers
                isOptional: true
                type: map()
                description: Map of custom HTTP headers to include in all requests
    notes: |
      - Returns `{:ok, %Supabase.Client{}}` on success or `{:error, reason}` on failure.
      - The raising variant `init_client!/2` returns the client directly or raises on error.
      - For module-based clients, `get_client!/0` returns a `%Supabase.Client{}` directly (raises on misconfiguration).
    examples:
      - id: module-based-client
        name: Module-based client (recommended)
        isSpotlight: true
        code: |
          ```elixir
          # Define client module (lib/my_app/supabase.ex)
          defmodule MyApp.Supabase do
            use Supabase.Client, otp_app: :my_app
          end

          # Configure in config/config.exs
          config :my_app, MyApp.Supabase,
            base_url: "https://xyzcompany.supabase.co",
            api_key: "public-anon-key",
            db: [schema: "public"],
            auth: [flow_type: :pkce]

          # Usage — builds a fresh client struct from config each time
          client = MyApp.Supabase.get_client!()

          # Update access token for authenticated requests
          client = MyApp.Supabase.set_auth!("user-access-token")
          ```
      - id: init-client-basic
        name: Direct initialization
        code: |
          ```elixir
          {:ok, client} = Supabase.init_client(
            "https://xyzcompany.supabase.co",
            "public-anon-key"
          )
          ```
      - id: init-client-options
        name: With additional parameters
        code: |
          ```elixir
          {:ok, client} = Supabase.init_client(
            "https://xyzcompany.supabase.co",
            "public-anon-key",
            db: [schema: "custom_schema"],
            auth: [flow_type: :pkce, auto_refresh_token: true],
            global: [headers: %{"x-api-version" => "2024-01-01"}]
          )
          ```
      - id: custom-http-client
        name: Custom HTTP client
        code: |
          ```elixir
          # Use your own Finch pool (the default pool won't be started)
          config :supabase_potion, finch_name: MyApp.Finch

          # Or use a completely custom HTTP adapter (must implement Supabase.Fetcher.Adapter)
          config :supabase_potion, http_client: MyApp.CustomHTTPClient

          # Tune the default Finch pool size
          config :supabase_potion, finch_pool: %{default: [size: 25]}
          ```

  # ──────────────────────────────────────────────────
  # Database (supabase_postgrest)
  # ──────────────────────────────────────────────────

  - id: from
    title: "Fetch data: from()"
    description: |
      Initializes a query builder for a specified table. This is the starting point for all database operations.

      All operations in supabase-postgrest are lazy, meaning queries are only executed when you explicitly call `execute/1` or `execute_to/2`.
    notes: |
      - Returns a `%Supabase.Fetcher.Request{}` query builder struct (chainable).
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: table
        isOptional: false
        type: String.t()
        description: The database table name to query
    examples:
      - id: basic-from
        name: Basic table query
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: select
    title: "Fetch data"
    description: |
      Selects records from a table. You can specify specific columns or use `"*"` for all columns.

      Note: By default this function does not return data. You must pass `returning: true` to get the selected fields returned in the response.
    notes: |
      - Returns the query builder (chainable). Call `execute/1` to get `{:ok, %Supabase.Fetcher.Response{}}` or `{:error, reason}`.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: columns
        isOptional: false
        type: String.t() | [String.t()]
        description: A list of column names to fetch, or `"*"` for all columns
      - name: options
        isOptional: true
        type: keyword()
        description: Query options
        subContent:
          - name: count
            isOptional: true
            type: atom()
            description: "Count algorithm - `:exact`, `:planned`, or `:estimated` (default `:exact`)"
          - name: returning
            isOptional: true
            type: boolean()
            description: Whether to return the selected data (default `false`)
    examples:
      - id: select-all
        name: Select all columns
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```
      - id: select-specific
        name: Select specific columns
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.select(["id", "name", "email"], returning: true)
          |> Q.execute()
          ```

  - id: insert
    title: "Insert data"
    description: |
      Inserts new records into the database. Supports conflict resolution and specifying how the result should be returned.
    notes: |
      - Returns the query builder (chainable). Call `execute/1` to get `{:ok, %Supabase.Fetcher.Response{}}` or `{:error, reason}`.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: data
        isOptional: false
        type: map() | [map()]
        description: The data to insert - a map or list of maps
      - name: options
        isOptional: true
        type: keyword()
        description: Insert options
        subContent:
          - name: on_conflict
            isOptional: true
            type: String.t()
            description: Column name for conflict resolution
          - name: returning
            isOptional: true
            type: atom()
            description: "Return representation - `:representation` or `:minimal` (default `:representation`)"
          - name: count
            isOptional: true
            type: atom()
            description: "Count algorithm - `:exact`, `:planned`, or `:estimated` (default `:exact`)"
    examples:
      - id: insert-single
        name: Insert a single record
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.insert(%{name: "John Doe", email: "john@example.com"})
          |> Q.execute()
          ```
      - id: insert-multiple
        name: Insert multiple records
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.insert([
            %{name: "John Doe", email: "john@example.com"},
            %{name: "Jane Smith", email: "jane@example.com"}
          ])
          |> Q.execute()
          ```

  - id: update
    title: "Update data"
    description: |
      Updates existing records in the database. Allows specifying return options and how the update is counted.
    notes: |
      - Returns the query builder (chainable). Call `execute/1` to get `{:ok, %Supabase.Fetcher.Response{}}` or `{:error, reason}`.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: data
        isOptional: false
        type: map()
        description: The new data for the update
      - name: options
        isOptional: true
        type: keyword()
        description: Update options
        subContent:
          - name: returning
            isOptional: true
            type: atom()
            description: "Return representation - `:representation` or `:minimal` (default `:representation`)"
          - name: count
            isOptional: true
            type: atom()
            description: "Count algorithm - `:exact`, `:planned`, or `:estimated` (default `:exact`)"
    examples:
      - id: update-record
        name: Update a record
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.eq("id", 1)
          |> Q.update(%{name: "John Smith"})
          |> Q.execute()
          ```

  - id: upsert
    title: "Upsert data"
    description: |
      Upserts data into a table, allowing for conflict resolution. If a record with the same unique constraint exists, it will be updated; otherwise, a new record is created.
    notes: |
      - Returns the query builder (chainable). Call `execute/1` to get `{:ok, %Supabase.Fetcher.Response{}}` or `{:error, reason}`.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: data
        isOptional: false
        type: map() | [map()]
        description: The data to upsert
      - name: options
        isOptional: true
        type: keyword()
        description: Upsert options
        subContent:
          - name: on_conflict
            isOptional: true
            type: String.t()
            description: Column name for conflict resolution
          - name: returning
            isOptional: true
            type: atom()
            description: "Return representation - `:representation` or `:minimal` (default `:representation`)"
          - name: count
            isOptional: true
            type: atom()
            description: "Count algorithm - `:exact`, `:planned`, or `:estimated` (default `:exact`)"
    examples:
      - id: upsert-record
        name: Upsert a record
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.upsert(%{id: 1, name: "Jane Doe"}, on_conflict: "id")
          |> Q.execute()
          ```

  - id: delete
    title: "Delete data"
    description: |
      Deletes records from a table based on the conditions specified.
    notes: |
      - Returns the query builder (chainable). Call `execute/1` to get `{:ok, %Supabase.Fetcher.Response{}}` or `{:error, reason}`.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: options
        isOptional: true
        type: keyword()
        description: Delete options
        subContent:
          - name: returning
            isOptional: true
            type: atom()
            description: "Return representation - `:representation` or `:minimal` (default `:representation`)"
          - name: count
            isOptional: true
            type: atom()
            description: "Count algorithm - `:exact`, `:planned`, or `:estimated` (default `:exact`)"
    examples:
      - id: delete-record
        name: Delete a record
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.eq("id", 1)
          |> Q.delete()
          |> Q.execute()
          ```

  - id: rpc
    title: "Call a Postgres function"
    description: |
      Perform a function call (Remote Procedure Call).

      This allows you to call PostgreSQL functions exposed through PostgREST.
    notes: |
      - Returns a query builder. Call `execute/1` to get `{:ok, %Supabase.Fetcher.Response{}}` or `{:error, reason}`.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: function
        isOptional: false
        type: String.t()
        description: The function name to call
      - name: args
        isOptional: true
        type: map()
        description: The arguments to pass to the function (default `%{}`)
      - name: options
        isOptional: true
        type: keyword()
        description: RPC options
        subContent:
          - name: head
            isOptional: true
            type: boolean()
            description: When `true`, data will not be returned (default `false`)
          - name: get
            isOptional: true
            type: boolean()
            description: When `true`, function is called with read-only access (default `false`)
          - name: count
            isOptional: true
            type: atom()
            description: "Count algorithm - `:exact`, `:planned`, or `:estimated`"
    examples:
      - id: rpc-call
        name: Call a database function
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.rpc(client, "get_user_stats", %{user_id: 123})
          |> Q.execute()
          ```

  # Filters

  - id: using-filters
    title: Using Filters
    description: |
      Filters allow you to only return rows that match certain conditions.

      Filters can be used on `select/3`, `update/3`, `upsert/3`, and `delete/2` queries.

      All filter operations are chainable and lazy - they build up the query without executing it. You must call `execute/1` or `execute_to/2` to run the query.
    notes: |
      - All filter functions return the `%Supabase.Fetcher.Request{}` query builder (chainable).
    examples:
      - id: applying-filters
        name: Applying Filters
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          # Chain multiple filters
          {:ok, result} = Q.from(client, "users")
          |> Q.eq("status", "active")
          |> Q.gte("age", 18)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: eq
    title: "Column is equal to a value"
    description: |
      Match only rows where the column is equal to the value.

      To check if a column value is NULL, use `is/3` instead.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: any()
        description: The value to match (must implement `String.Chars` protocol)
    examples:
      - id: eq-filter
        name: Filter by equality
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.eq("email", "john@example.com")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: neq
    title: "Column is not equal to a value"
    description: |
      Match only rows where the column is not equal to the value.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: any()
        description: The value to not match (must implement `String.Chars` protocol)
    examples:
      - id: neq-filter
        name: Filter by inequality
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.neq("status", "inactive")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: gt
    title: "Column is greater than a value"
    description: |
      Match only rows where the column is greater than the value.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: any()
        description: The value to compare (must implement `String.Chars` protocol)
    examples:
      - id: gt-filter
        name: Filter by greater than
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.gt("age", 21)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: gte
    title: "Column is greater than or equal to a value"
    description: |
      Match only rows where the column is greater than or equal to the value.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: any()
        description: The value to compare (must implement `String.Chars` protocol)
    examples:
      - id: gte-filter
        name: Filter by greater than or equal
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.gte("age", 18)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: lt
    title: "Column is less than a value"
    description: |
      Match only rows where the column is less than the value.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: any()
        description: The value to compare (must implement `String.Chars` protocol)
    examples:
      - id: lt-filter
        name: Filter by less than
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.lt("age", 65)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: lte
    title: "Column is less than or equal to a value"
    description: |
      Match only rows where the column is less than or equal to the value.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: any()
        description: The value to compare (must implement `String.Chars` protocol)
    examples:
      - id: lte-filter
        name: Filter by less than or equal
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.lte("age", 65)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: like
    title: "Column matches a pattern"
    description: |
      Match only rows where the column matches the pattern (case-sensitive).
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: pattern
        isOptional: false
        type: String.t()
        description: The pattern to match (use `%` for wildcards)
    examples:
      - id: like-filter
        name: Filter with pattern matching
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.like("name", "%John%")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: ilike
    title: "Column matches a case-insensitive pattern"
    description: |
      Match only rows where the column matches the pattern (case-insensitive).
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: pattern
        isOptional: false
        type: String.t()
        description: The pattern to match (use `%` for wildcards)
    examples:
      - id: ilike-filter
        name: Filter with case-insensitive pattern matching
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.ilike("name", "%john%")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: is
    title: "Column is a value"
    description: |
      Match only rows where the column IS the value.

      For non-boolean columns, this is only relevant for checking if the value is NULL by setting value to `nil`.

      For boolean columns, you can also set value to `true` or `false`.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: value
        isOptional: false
        type: nil | boolean()
        description: The value to check - `nil` for NULL checks, or boolean
    examples:
      - id: is-null
        name: Filter for NULL values
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.is("deleted_at", nil)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: in
    title: "Column is in an array"
    description: |
      Match only rows where the column value is in the provided list.

      In the Elixir SDK, this function is called `within/3` to avoid conflicts with the Elixir `in` keyword.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to filter on
      - name: values
        isOptional: false
        type: "[any()]"
        description: List of acceptable values (all must implement `String.Chars` protocol)
    examples:
      - id: within-filter
        name: Filter by list of values
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.within("status", ["active", "pending", "verified"])
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: text-search
    title: "Match a string"
    description: |
      Match only rows where the column matches the full-text search query.

      Only relevant for text and tsvector columns.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to search
      - name: query
        isOptional: false
        type: String.t()
        description: The text query for the search
      - name: options
        isOptional: true
        type: keyword()
        description: Search options
        subContent:
          - name: type
            isOptional: true
            type: atom()
            description: "Search type - `:plain`, `:phrase`, or `:websearch`"
          - name: config
            isOptional: true
            type: String.t()
            description: Text search configuration name
    examples:
      - id: text-search-filter
        name: Full-text search
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "posts")
          |> Q.text_search("content", "elixir supabase", type: :plain)
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  # Modifiers

  - id: using-modifiers
    title: Using Modifiers
    description: |
      Modifiers allow you to change the format and structure of the response.

      Filters work on the row level - they allow you to return rows that only match certain conditions without changing the shape of the rows. Modifiers are everything that don't fit that definition - allowing you to change the format of the response (e.g., ordering, limiting, or returning a single object instead of an array).

      Modifiers must be specified after filters. Most modifiers apply to queries that return rows (e.g., `select/3` or `rpc/4` on a function that returns a table response).
    notes: |
      - All modifier functions return the `%Supabase.Fetcher.Request{}` query builder (chainable).
    examples:
      - id: applying-modifiers
        name: Applying Modifiers
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          # Chain modifiers to shape the response
          {:ok, result} = Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.order("created_at", asc: false)
          |> Q.limit(10)
          |> Q.execute()
          ```

  - id: order
    title: "Order the results"
    description: |
      Order the query results by the specified column.

      You can call this method multiple times to order by multiple columns.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: column
        isOptional: false
        type: String.t()
        description: The column to order by
      - name: options
        isOptional: true
        type: keyword()
        description: Ordering options
        subContent:
          - name: asc
            isOptional: true
            type: boolean()
            description: Sort in ascending order (default `false` for descending)
          - name: null_first
            isOptional: true
            type: boolean()
            description: Place NULL values first (default `false`)
          - name: foreign_table
            isOptional: true
            type: String.t()
            description: The foreign table to order (for joins)
    examples:
      - id: order-asc
        name: Order results ascending
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.order("created_at", asc: true)
          |> Q.execute()
          ```

  - id: limit
    title: "Limit the number of rows returned"
    description: |
      Limit the number of rows returned by the query.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: count
        isOptional: false
        type: integer()
        description: The maximum number of rows to return
      - name: options
        isOptional: true
        type: keyword()
        description: Limit options
        subContent:
          - name: foreign_table
            isOptional: true
            type: String.t()
            description: The foreign table to limit (for joins)
    examples:
      - id: limit-rows
        name: Limit query results
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.limit(10)
          |> Q.execute()
          ```

  - id: range
    title: "Limit the query to a range"
    description: |
      Limit the query results to a specific range. The `from` and `to` values are 0-based and inclusive.

      This respects the query order. If there is no order clause, the range could behave unexpectedly.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: from
        isOptional: false
        type: integer()
        description: The starting index (0-based, inclusive)
      - name: to
        isOptional: false
        type: integer()
        description: The ending index (inclusive)
      - name: options
        isOptional: true
        type: keyword()
        description: Range options
        subContent:
          - name: foreign_table
            isOptional: true
            type: String.t()
            description: The foreign table to range (for joins)
    examples:
      - id: range-pagination
        name: Paginate results
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.range(0, 9)
          |> Q.execute()
          ```

  - id: single
    title: "Retrieve one row of data"
    description: |
      Return data as a single object instead of an array of objects.

      Query result must be one row (e.g., using `limit(1)`), otherwise this returns an error.
    notes: |
      - Returns the query builder `%Supabase.Fetcher.Request{}` (chainable).
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
    examples:
      - id: single-row
        name: Retrieve single row
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.eq("id", 1)
          |> Q.select("*", returning: true)
          |> Q.single()
          |> Q.execute()
          ```

  - id: execute
    title: "Execute a query"
    description: |
      Executes the constructed query and returns the result.

      All queries are lazy in supabase-postgrest, so you must call this function to actually execute the query.
    notes: |
      - Returns `{:ok, %Supabase.Fetcher.Response{}}` on success or `{:error, reason}` on failure.
      - The response body contains the query results as decoded JSON.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
    examples:
      - id: execute-query
        name: Execute a query
        code: |
          ```elixir
          alias Supabase.PostgREST, as: Q

          {:ok, result} = Q.from(client, "users")
          |> Q.select("*", returning: true)
          |> Q.execute()
          ```

  - id: execute_to
    title: "Execute and cast to struct"
    description: |
      Executes the query and maps the resulting data to a specified Elixir struct.

      This is useful for automatically casting database results to your application's domain models.
    notes: |
      - Returns `{:ok, struct}` or `{:ok, [struct]}` on success, or `{:error, reason}` on failure.
      - The result is automatically cast to the specified module struct.
    params:
      - name: builder
        isOptional: false
        type: Supabase.Fetcher.Request.t()
        description: The query builder instance
      - name: schema
        isOptional: false
        type: module()
        description: The Elixir module/struct to cast results to
    examples:
      - id: execute-to-struct
        name: Execute and cast to struct
        code: |
          ```elixir
          defmodule User do
            defstruct [:id, :name, :email]
          end

          alias Supabase.PostgREST, as: Q

          {:ok, %User{} = user} = Q.from(client, "users")
          |> Q.eq("id", 1)
          |> Q.select(["id", "name", "email"], returning: true)
          |> Q.single()
          |> Q.execute_to(User)
          ```

  # ──────────────────────────────────────────────────
  # Auth (supabase_auth)
  # ──────────────────────────────────────────────────

  - id: auth-api
    title: Overview
    description: |
      The Supabase Auth module provides authentication and user management functionality.

      All auth methods accept a `Supabase.Client` as the first argument. The auth module supports multiple sign-in methods including password, OAuth, OTP, SSO, and anonymous sign-in.

      The Elixir SDK also provides integration with Plug and Phoenix LiveView for server-side authentication flows.

  - id: sign-up
    title: "Create a new user"
    description: |
      Creates a new user with email/phone and password.
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
      - By default, the user needs to verify their email address before logging in. To turn this off, disable **Confirm email** in [your project](https://supabase.com/dashboard/project/_/auth/providers).
      - If **Confirm email** is enabled, a `user` is returned but `session` is nil.
      - If **Confirm email** is disabled, both a `user` and a `session` are returned.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: credentials
        isOptional: false
        type: map()
        description: The user credentials
        subContent:
          - name: email
            isOptional: true
            type: String.t()
            description: The user's email address
          - name: phone
            isOptional: true
            type: String.t()
            description: The user's phone number
          - name: password
            isOptional: false
            type: String.t()
            description: The user's password
    examples:
      - id: sign-up-email
        name: Sign up with email
        code: |
          ```elixir
          {:ok, session} = Supabase.Auth.sign_up(client, %{
            email: "user@example.com",
            password: "secure-password"
          })
          ```

  - id: sign-in-with-password
    title: "Sign in a user"
    description: |
      Log in an existing user with an email/phone and password.
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
      - Requires either an email and password or a phone number and password.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: credentials
        isOptional: false
        type: map()
        description: The sign-in credentials
        subContent:
          - name: email
            isOptional: true
            type: String.t()
            description: The user's email address
          - name: phone
            isOptional: true
            type: String.t()
            description: The user's phone number
          - name: password
            isOptional: false
            type: String.t()
            description: The user's password
    examples:
      - id: sign-in-email-password
        name: Sign in with email and password
        code: |
          ```elixir
          {:ok, session} = Supabase.Auth.sign_in_with_password(client, %{
            email: "user@example.com",
            password: "secure-password"
          })
          ```

  - id: sign-in-with-otp
    title: "Sign in a user through OTP"
    description: |
      Log in a user using a one-time password (OTP) sent to their email or phone.
    notes: |
      - Returns `{:ok, map()}` on success or `{:error, reason}` on failure.
      - The OTP is sent to the user's email or phone — call `verify_otp/2` to complete sign-in.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: credentials
        isOptional: false
        type: map()
        description: The OTP sign-in credentials
        subContent:
          - name: email
            isOptional: true
            type: String.t()
            description: The user's email address
          - name: phone
            isOptional: true
            type: String.t()
            description: The user's phone number
    examples:
      - id: sign-in-otp-email
        name: Sign in with OTP via email
        code: |
          ```elixir
          {:ok, _} = Supabase.Auth.sign_in_with_otp(client, %{
            email: "user@example.com"
          })
          ```

  - id: sign-in-with-oauth
    title: "Sign in a user through OAuth"
    description: |
      Log in a user using a third-party OAuth provider. Returns the URL to redirect the user to for authentication.
    notes: |
      - Returns `{:ok, %{url: String.t()}}` on success or `{:error, reason}` on failure.
      - Redirect the user to the returned URL to complete the OAuth flow.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: credentials
        isOptional: false
        type: map()
        description: The OAuth sign-in options
        subContent:
          - name: provider
            isOptional: false
            type: atom()
            description: "The OAuth provider (e.g., `:github`, `:google`, `:discord`)"
          - name: redirect_to
            isOptional: true
            type: String.t()
            description: URL to redirect to after sign-in
          - name: scopes
            isOptional: true
            type: String.t()
            description: OAuth scopes to request
    examples:
      - id: sign-in-oauth-github
        name: Sign in with GitHub
        code: |
          ```elixir
          {:ok, %{url: redirect_url}} = Supabase.Auth.sign_in_with_oauth(client, %{
            provider: :github,
            redirect_to: "http://localhost:4000/auth/callback"
          })
          ```

  - id: sign-in-with-id-token
    title: "Sign in with ID token (native sign-in)"
    description: |
      Sign in a user using an ID token from a third-party provider (e.g., Google, Apple).
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: credentials
        isOptional: false
        type: map()
        description: The ID token credentials
        subContent:
          - name: provider
            isOptional: false
            type: atom()
            description: The provider that issued the token
          - name: token
            isOptional: false
            type: String.t()
            description: The ID token
    examples:
      - id: sign-in-id-token
        name: Sign in with ID token
        code: |
          ```elixir
          {:ok, session} = Supabase.Auth.sign_in_with_id_token(client, %{
            provider: :google,
            token: "google-id-token"
          })
          ```

  - id: sign-in-with-sso
    title: "Sign in a user through SSO"
    description: |
      Log in a user using Single Sign-On (SSO). Returns the URL to redirect the user to.
    notes: |
      - Returns `{:ok, %{url: String.t()}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: credentials
        isOptional: false
        type: map()
        description: The SSO sign-in options
        subContent:
          - name: domain
            isOptional: true
            type: String.t()
            description: The SSO domain
          - name: provider_id
            isOptional: true
            type: String.t()
            description: The SSO provider ID
    examples:
      - id: sign-in-sso
        name: Sign in with SSO
        code: |
          ```elixir
          {:ok, %{url: redirect_url}} = Supabase.Auth.sign_in_with_sso(client, %{
            domain: "company.com"
          })
          ```

  - id: sign-in-anonymously
    title: "Create an anonymous user"
    description: |
      Creates an anonymous user session. The user can later be linked to an identity.
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: options
        isOptional: true
        type: map()
        description: Additional options
    examples:
      - id: sign-in-anon
        name: Sign in anonymously
        code: |
          ```elixir
          {:ok, session} = Supabase.Auth.sign_in_anonymously(client)
          ```

  - id: sign-out
    title: "Sign out a user"
    description: |
      Signs out the current user and invalidates their session.
    notes: |
      - Returns `:ok` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: options
        isOptional: true
        type: map()
        description: Sign out options
        subContent:
          - name: scope
            isOptional: true
            type: atom()
            description: "Sign out scope - `:global` or `:local` (default `:global`)"
    examples:
      - id: sign-out-user
        name: Sign out
        code: |
          ```elixir
          :ok = Supabase.Auth.sign_out(client)
          ```

  - id: verify-otp
    title: "Verify and log in through OTP"
    description: |
      Verifies the OTP token and logs in the user.
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: params
        isOptional: false
        type: map()
        description: OTP verification parameters
        subContent:
          - name: token
            isOptional: false
            type: String.t()
            description: The OTP token
          - name: type
            isOptional: false
            type: atom()
            description: "The verification type (e.g., `:signup`, `:sms`, `:email`)"
          - name: email
            isOptional: true
            type: String.t()
            description: The user's email (for email OTP)
          - name: phone
            isOptional: true
            type: String.t()
            description: The user's phone (for SMS OTP)
    examples:
      - id: verify-otp-email
        name: Verify email OTP
        code: |
          ```elixir
          {:ok, session} = Supabase.Auth.verify_otp(client, %{
            email: "user@example.com",
            token: "123456",
            type: :email
          })
          ```

  - id: get-user
    title: "Retrieve a user"
    description: |
      Gets the current user details using a session.
    notes: |
      - Returns `{:ok, %Supabase.Auth.User{}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: session
        isOptional: false
        type: Supabase.Auth.Session.t()
        description: The user's current session
    examples:
      - id: get-current-user
        name: Get current user
        code: |
          ```elixir
          {:ok, user} = Supabase.Auth.get_user(client, session)
          ```

  - id: update-user
    title: "Update a user"
    description: |
      Updates the current user's attributes (email, password, metadata, etc.).
      Accepts either a `Plug.Conn` or `Phoenix.LiveView.Socket` as the connection parameter.
    notes: |
      - Returns `{:ok, conn}` on success (with updated session) or `{:error, reason}` on failure.
      - The `conn` parameter can be a `Plug.Conn.t()` or `Phoenix.LiveView.Socket.t()`.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: conn
        isOptional: false
        type: Plug.Conn.t() | Phoenix.LiveView.Socket.t()
        description: The current connection (Plug conn or LiveView socket)
      - name: attrs
        isOptional: false
        type: map()
        description: The attributes to update
        subContent:
          - name: email
            isOptional: true
            type: String.t()
            description: New email address
          - name: password
            isOptional: true
            type: String.t()
            description: New password
          - name: data
            isOptional: true
            type: map()
            description: Custom user metadata
    examples:
      - id: update-user-email
        name: Update user email
        code: |
          ```elixir
          {:ok, conn} = Supabase.Auth.update_user(client, conn, %{
            email: "newemail@example.com"
          })
          ```

  - id: refresh-session
    title: "Retrieve a new session"
    description: |
      Returns a new session by refreshing the current session's access and refresh tokens.
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: refresh_token
        isOptional: false
        type: String.t()
        description: The refresh token from the current session
    examples:
      - id: refresh-session
        name: Refresh a session
        code: |
          ```elixir
          {:ok, new_session} = Supabase.Auth.refresh_session(client, refresh_token)
          ```

  - id: reset-password-for-email
    title: "Send a password reset request"
    description: |
      Sends a password reset email to the specified address.
    notes: |
      - Returns `:ok` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: email
        isOptional: false
        type: String.t()
        description: The user's email address
      - name: options
        isOptional: true
        type: map()
        description: Reset options
        subContent:
          - name: redirect_to
            isOptional: true
            type: String.t()
            description: URL to redirect to after password reset
    examples:
      - id: reset-password
        name: Send password reset email
        code: |
          ```elixir
          :ok = Supabase.Auth.reset_password_for_email(client, "user@example.com",
            redirect_to: "http://localhost:4000/auth/reset"
          )
          ```

  - id: resend-email-or-phone-otps
    title: "Resend an OTP"
    description: |
      Resends an OTP email or SMS to the user.
    notes: |
      - Returns `:ok` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: email
        isOptional: false
        type: String.t()
        description: The user's email address
      - name: resend_params
        isOptional: false
        type: Supabase.Auth.Schemas.ResendParams.t()
        description: The resend parameters
        subContent:
          - name: type
            isOptional: false
            type: atom()
            description: "The type of OTP to resend (e.g., `:signup`, `:sms`, `:email_change`)"
    examples:
      - id: resend-otp
        name: Resend signup confirmation
        code: |
          ```elixir
          :ok = Supabase.Auth.resend(client, "user@example.com", %ResendParams{
            type: :signup
          })
          ```

  - id: exchange-code-for-session
    title: "Exchange an auth code for a session"
    description: |
      Exchanges an authorization code for a session. Used in PKCE flows.
    notes: |
      - Returns `{:ok, %Supabase.Auth.Session{}}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: auth_code
        isOptional: false
        type: String.t()
        description: The authorization code
      - name: code_verifier
        isOptional: false
        type: String.t()
        description: The PKCE code verifier
    examples:
      - id: exchange-code
        name: Exchange code for session
        code: |
          ```elixir
          {:ok, session} = Supabase.Auth.exchange_code_for_session(client,
            auth_code,
            code_verifier
          )
          ```

  - id: get-user-identities
    title: "Retrieve identities linked to a user"
    description: |
      Gets all identities linked to the current user.
    notes: |
      - Returns `{:ok, [%Supabase.Auth.Identity{}]}` on success or `{:error, reason}` on failure.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: access_token
        isOptional: false
