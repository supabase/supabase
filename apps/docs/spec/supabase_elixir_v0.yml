  # ──────────────────────────────────────────────────
  # Edge Functions (supabase_functions)
  # ──────────────────────────────────────────────────

  - id: invoke
    title: "Invokes a Supabase Edge Function."
    description: |
      Invokes a Supabase Edge Function with the specified name and optional body.

      You can pass custom headers, specify the response type, and upload files via multipart.
    notes: |
      - Returns `{:ok, %Supabase.Fetcher.Response{}}` on success or `{:error, reason}` on failure.
      - Supports multipart file uploads by passing `{:multipart, parts}` as the body.
    params:
      - name: client
        isOptional: false
        type: Supabase.Client.t()
        description: The Supabase client instance
      - name: function_name
        isOptional: false
        type: String.t()
        description: The name of the Edge Function to invoke
      - name: options
        isOptional: true
        type: keyword()
        description: Invocation options
        subContent:
          - name: body
            isOptional: true
            type: map() | String.t() | {:multipart, list()}
            description: "The request body — a map (JSON-encoded), a string, or `{:multipart, parts}` for file uploads"
          - name: headers
            isOptional: true
            type: map()
            description: Additional HTTP headers
          - name: method
            isOptional: true
            type: atom()
            description: "The HTTP method (default `:post`)"
    examples:
      - id: invoke-function
        name: Invoke an Edge Function
        code: |
          ```elixir
          {:ok, response} = Supabase.Functions.invoke(client, "hello-world", body: %{name: "Elixir"})
          ```
      - id: invoke-multipart
        name: Upload a file via multipart
        code: |
          ```elixir
          {:ok, response} = Supabase.Functions.invoke(client, "upload-handler",
            body: {:multipart, [
              {:file, "/path/to/image.png", filename: "image.png", content_type: "image/png"},
              {:field, "description", "Profile photo"}
            ]}
          )
          ```

  # ──────────────────────────────────────────────────
  # Realtime (supabase_realtime)
  # ──────────────────────────────────────────────────

  - id: realtime-api
    title: Overview
    description: |
      The Supabase Realtime module provides WebSocket-based real-time subscriptions.

      It supports PostgreSQL change subscriptions, broadcast messaging, and presence tracking. The Elixir implementation is built on OTP with automatic reconnection and exponential backoff.

      Start a Realtime connection by adding it to your supervision tree or calling `start_link/2`.

  - id: subscribe
    title: "Subscribe to channel"
    description: |
      Creates a channel subscription and registers event handlers. Channels can listen to database changes, broadcast messages, and presence events.
    notes: |
      - Returns `{:ok, pid()}` for the channel process on success.
    params:
      - name: realtime
        isOptional: false
        type: pid() | module()
        description: The Realtime process
      - name: topic
        isOptional: false
        type: String.t()
        description: The channel topic to subscribe to
      - name: options
        isOptional: true
        type: keyword()
        description: Channel options
        subContent:
          - name: config
            isOptional: true
            type: map()
            description: Channel configuration (e.g., presence key)
    examples:
      - id: subscribe-changes
        name: Subscribe to database changes
        code: |
          ```elixir
          {:ok, channel} = Supabase.Realtime.channel(realtime, "public:users")

          Supabase.Realtime.on(channel, "postgres_changes", fn payload ->
            IO.inspect(payload, label: "Change received")
          end)
          ```
      - id: subscribe-broadcast
        name: Subscribe to broadcast
        code: |
          ```elixir
          {:ok, channel} = Supabase.Realtime.channel(realtime, "room:lobby")

          Supabase.Realtime.on(channel, "broadcast", fn %{event: event, payload: payload} ->
            IO.puts("Received #{event}: #{inspect(payload)}")
          end)
          ```

  - id: remove-channel
    title: "Unsubscribe from a channel"
    description: |
      Removes a channel subscription.
    notes: |
      - Returns `:ok`.
    params:
      - name: channel
        isOptional: false
        type: pid()
        description: The channel process to unsubscribe from
    examples:
      - id: unsubscribe-channel
        name: Unsubscribe from a channel
        code: |
          ```elixir
          :ok = Supabase.Realtime.unsubscribe(channel)
          ```

  - id: remove-all-channels
    title: "Unsubscribe from all channels"
    description: |
      Removes all active channel subscriptions.
    notes: |
      - Returns `:ok`.
    params:
      - name: realtime
        isOptional: false
        type: pid() | module()
        description: The Realtime process
    examples:
      - id: remove-all
        name: Remove all channels
        code: |
          ```elixir
          :ok = Supabase.Realtime.remove_all_channels(realtime)
          ```

  - id: get-channels
    title: "Retrieve all channels"
    description: |
      Returns the list of currently active channel subscriptions.
    notes: |
      - Returns a list of channel process references.
    params:
      - name: realtime
        isOptional: false
        type: pid() | module()
        description: The Realtime process
    examples:
      - id: get-channels
        name: List active channels
        code: |
          ```elixir
          channels = Supabase.Realtime.fetch_channel_registry(realtime)
          ```

  - id: broadcast-message
    title: "Broadcast a message"
    description: |
      Sends a broadcast message to all subscribers of a channel.
    notes: |
      - Returns `:ok` on success or `{:error, reason}` on failure.
    params:
      - name: channel
        isOptional: false
        type: pid()
        description: The channel to broadcast to
      - name: event
        isOptional: false
        type: String.t()
        description: The event name
      - name: payload
        isOptional: false
        type: map()
        description: The message payload
      - name: options
        isOptional: true
        type: keyword()
        description: Broadcast options
    examples:
      - id: broadcast
        name: Broadcast a message
        code: |
          ```elixir
          :ok = Supabase.Realtime.broadcast(channel, "cursor_move", %{
            x: 100,
            y: 200,
            user_id: "abc123"
          })
          ```
      - id: broadcast-with-ack
        name: Broadcast with acknowledgement
        code: |
          ```elixir
          :ok = Supabase.Realtime.broadcast_with_ack(channel, "typing", %{
            user: "alice"
          })
          ```

